program: src/train.py
method: bayes
metric:
  name: val_accuracy
  goal: maximize
parameters:
  dataset:
    value: "mnist"
  epochs:
    value: 10
  batch_size:
    values: [32, 64]
  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop", "adam", "nadam"]
  learning_rate:
    values: [0.1, 0.01, 0.001, 0.0001]
  num_layers:
    values: [1, 2, 3]
  hidden_size:
    values: [32, 64, 128]
  activation:
    values: ["relu", "sigmoid", "tanh"]
  loss:
    value: "cross_entropy"
  weight_init:
    values: ["random", "xavier"]
  weight_decay:
    values: [0.0, 0.0005]
  wandb_project:
    value: "da6401_assignment_1_myfork-src"
